<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Fluxograma</title>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/svg2pdf.js@2.5.0/dist/svg2pdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <link rel="stylesheet" href="estilo.css?v=20" />
</head>
<body>

  <div class="page">
    <h1>Gerador de Fluxograma de Processos</h1>

    <div class="top-form">
      <div class="field">
        <label for="desenho">Desenho</label>
        <input id="desenho" type="text" placeholder="Ex.: As Is / To Be" />
      </div>

      <div class="field">
        <label for="processo">Nome do Processo</label>
        <input id="processo" type="text" placeholder="Ex.: Fechamento OPEX" />
      </div>

      <div class="field">
        <label for="analista">Analista</label>
        <input id="analista" type="text" placeholder="Ex.: Ricardo" />
      </div>

      <div class="field">
        <label for="negocio">Negócio</label>
        <input id="negocio" type="text" placeholder="Ex.: Raízen / Comgás / Rumo" />
      </div>

      <div class="field">
        <label for="area">Área</label>
        <input id="area" type="text" placeholder="Ex.: Controladoria" />
      </div>

      <div class="field">
        <label for="gestor">Gestor</label>
        <input id="gestor" type="text" placeholder="Ex.: Nome do gestor imediato" />
      </div>

      <div class="field">
        <label for="valorFTE">Valor FTE (h/mês)</label>
        <input id="valorFTE" type="text" placeholder="Ex.: 168" />
      </div>

      <div class="field">
        <label for="volumetria">Volumetria (exec./mês)</label>
        <input id="volumetria" type="text" placeholder="Ex.: 250" />
      </div>
    </div>

    <div class="montar-fluxo-topo">
      <div class="montar-bloco">
        <h3>Monte o fluxo na tabela</h3>
        <div class="actions">
          <button type="button" onclick="adicionarLinha()">+ Nova etapa</button>
          <button type="button" onclick="gerarFluxo()">GERAR FLUXO</button>
          <button type="button" class="secondary" onclick="limparTudo()">LIMPAR</button>
        </div>
      </div>

      <div class="montar-bloco">
        <h3>Monte seu fluxo no Excel</h3>
        <div class="actions">
          <button type="button" onclick="baixarModeloExcel()">Baixar modelo Excel</button>
          <button type="button" class="secondary" onclick="document.getElementById('importarExcelInput').click()">Importar modelo Excel</button>
          <input type="file" id="importarExcelInput" accept=".xlsx,.xls,.xlsm,.csv,.tsv,.txt" style="display:none" onchange="importarExcelNativo(event)" />
        </div>
      </div>
    </div>

    <div class="tabela-wrap">
      <table id="tabelaFluxo">
        <thead>
          <tr>
            <th>Área</th>
            <th>Atividade</th>
            <th>Tipo</th>
            <th>Sistema</th>
            <th>Tempo</th>
            <th>Cor</th>
            <th>Não</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tbodyFluxo"></tbody>
      </table>
    </div>

    <hr>

    <div class="section-header">
      <h3>Fluxo</h3>
      <div class="actions inline-actions">
        <button type="button" onclick="gerarFluxo()">GERAR FLUXO</button>
        <button type="button" id="btnAjustarFluxo" class="btn-editar" onclick="alternarModoEdicao()">Ajustar fluxo</button>
        <button type="button" id="btnDesfazer" class="secondary" onclick="desfazer()" title="Desfazer (Ctrl+Z fora dos campos)" disabled>↶ Desfazer</button>
        <button type="button" id="btnRefazer" class="secondary" onclick="refazer()" title="Refazer (Ctrl+Y fora dos campos)" disabled>↷ Refazer</button>
        <button type="button" onclick="baixarSVG()">Baixar Fluxo</button>
        <button type="button" onclick="baixarSVGExcel()">Baixar SVG Excel</button>
        <button type="button" onclick="baixarPNG()">Baixar PNG</button>
        <button type="button" onclick="baixarAnalisePDF()">Baixar Análise</button>
      </div>
    </div>

    <div class="section-header">
      <h3>Projeto</h3>
      <div class="actions inline-actions">
        <button type="button" onclick="exportarProjetoJSON()">Exportar Projeto (.json)</button>
        <button type="button" class="secondary" onclick="document.getElementById('importarProjetoInput').click()">Importar Projeto (.json)</button>
        <input type="file" id="importarProjetoInput" accept="application/json,.json" style="display:none" onchange="importarProjetoJSON(event)" />

        <button type="button" onclick="exportarExcelNativo()">Exportar projeto Excel</button>
      </div>
    </div>

   <div id="painelValidacao" style="display:none"></div>

   <div class="diagram-scroll-top" id="diagramScrollTop">
  <div id="diagramScrollTopInner"></div>
</div>

<div id="diagramWrap">
  <div id="diagram"></div>
</div>

    <hr>

    <h3>Informações do Processo</h3>
    <div id="infoProcesso"></div>

    <h3>Análise do Processo</h3>
    <div id="metricas"></div>
  </div>

  <!-- script.js modularizado (D1). Ordem = ordem de leitura do monolito original. NAO reordenar. -->
  <script src="js/01-estado.js?v=20"></script>
  <script src="js/02-tabela.js?v=20"></script>
  <script src="js/03-utils.js?v=20"></script>
  <script src="js/04-desenho.js?v=20"></script>
  <script src="js/05-roteamento.js?v=20"></script>
  <script src="js/06-analise.js?v=20"></script>
  <script src="js/07-gerar-fluxo.js?v=20"></script>
  <script src="js/08-excel.js?v=20"></script>
  <script src="js/09-pdf.js?v=20"></script>
  <script src="js/10-export-app.js?v=20"></script>
  <script src="js/11-editor.js?v=20"></script>
  <script src="js/12-validacao.js?v=20"></script>
  <script src="js/13-undo.js?v=20"></script>
  <script src="js/14-excel-io.js?v=20"></script>
</body>
</html>
